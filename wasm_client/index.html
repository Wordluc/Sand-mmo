<html>
    <head>
        <meta charset="utf-8"/>
        <script src="wasm_exec.js"></script>
        <script>
            const go = new Go();
            WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
                go.run(result.instance);
            });
        </script>
		<script>
			function loop() { 
				if (window.goFrame!=null){
					window.goFrame();
				}
				requestAnimationFrame(loop); 
			}
			requestAnimationFrame(loop);
		</script>
    </head>
    <body>
	<canvas id="GAME_WINDOW" >
	</canvas>
    <div id="buttons"></div>

	</body>
</html>
