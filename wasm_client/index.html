<html>
	<head>
		<meta charset="utf-8"/>
		<link href="node_modules/snes.css/dist/snes.css" rel="stylesheet">
		<link href="brush.css" rel="stylesheet">
		<link href="dpad.css" rel="stylesheet">
		<link href="game.css" rel="stylesheet">
		<link href="modal.css" rel="stylesheet">
		<script src="wasm_exec.js"></script>
		<script src="modal.js"></script>
		<script src="touch.js"></script>
		<script>
			const go = new Go();
			WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
				go.run(result.instance);
			});
			function loop() {
				if (window.goFrame != null) { window.goFrame(); }
				requestAnimationFrame(loop);
			}
			requestAnimationFrame(loop);
		</script>
	</head>
	<body>
		<button id="button-modal" onclick="toggle_modal()">?</button>
		<div id="info-modal" class="hidden">
			<h3>Commands:</h3>
			<ul>
				<li>WASD or Arrows: to move view</li>
				<li>r or G: to place elements generator</li>
			</ul>
		</div>
		<div class="game">
			<div class="dpad">
				<div class="empty"></div>
				<button onclick="moveView(0,-1)" class="btn touchButton" id="up">▲</button>
				<div class="empty"></div>
				<button onclick="moveView(-1,0)" class="btn touchButton" id="left">◀</button>
				<div onclick="setGenerator()" class="btn" id="generator">G</div>
				<button onclick="moveView(1,0)" class="btn touchButton" id="right">▶</button>
				<div class="empty"></div>
				<button onclick="moveView(0,1)" class="btn touchButton" id="down">▼</button>
				<div class="empty"></div>
			</div>
			<div class="play_zone">
				<canvas id="game_window"></canvas>
				<div class="brush">
					<div class="radio-group" onchange="window.changeBrushSize(event)">
						<label><input type="radio" name="brush-size" class="snes-radio" value="small"  checked>Small</label>
						<label><input type="radio" name="brush-size" class="snes-radio" value="big" >Big</label>
					</div>
					|
					<div class="radio-group"onchange="window.changeBrushShape(event)">
						<label><input type="radio" name="brush-shape" class="snes-radio" value="circle"  checked>Circle</label>
						<label><input type="radio" name="brush-shape" class="snes-radio" value="square" >Square</label>
					</div>
				</div>

			</div>
			<div class="controller">
				<div id="carosello">
					<button id="carosello-button-up" class="carosello-arrow" onclick="move_carosello(-1)">Up</button>
					<div id="carosello-border">
						<button class="carosello-buttons" id="carosello-button-1">Prova1</button>
						<button class="carosello-buttons" id="carosello-button-2">Prova2</button>
						<button class="carosello-buttons" id="carosello-button-3">Prova3</button>
					</div>
					<button id="carosello-button-down" class="carosello-arrow" onclick="move_carosello(1)">Down</button>
				</div>
			</div>
		</div>
	</body>
</html>
